<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sakura Local Gallery</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">SK</div>
        <div>
          <h1>本地图库</h1>
          <p>Sakura Library</p>
        </div>
      </div>

      <nav class="nav">
        <button class="nav-button active" data-view="gallery">图库</button>
        <button class="nav-button" data-view="favorites">收藏</button>
        <button class="nav-button" data-view="artists">作者</button>
        <button class="nav-button" data-view="sync">同步</button>
      </nav>

      <section class="panel plugin-panel">
        <h2>插件页面</h2>
        <div id="pluginNav" class="nav compact-nav"></div>
      </section>

      <section class="panel">
        <h2>标签</h2>
        <div id="tagList" class="tag-list"></div>
      </section>
    </aside>

    <main class="main">
      <header class="toolbar">
        <div class="search-wrap">
          <input id="searchInput" type="search" placeholder="搜索标题、作者、简介" />
          <select id="typeFilter" aria-label="类型筛选">
            <option value="">全部类型</option>
            <option value="illust">插画</option>
            <option value="novel">小说</option>
          </select>
        </div>
        <div class="toolbar-actions">
          <button id="buildThumbsButton" class="ghost-button">生成缩略图</button>
          <button id="scanButton" class="primary-button">扫描旧目录</button>
        </div>
      </header>

      <section id="statusLine" class="status-line">准备就绪</section>

      <section id="galleryView" class="view active">
        <div class="section-head">
          <div>
            <h2 id="viewTitle">全部作品</h2>
            <p id="viewSubtitle">本地已入库作品</p>
          </div>
          <button id="clearFiltersButton" class="ghost-button">清除筛选</button>
        </div>
        <div id="artworkGrid" class="artwork-grid"></div>
        <div class="pager">
          <button id="prevPageButton" class="ghost-button">上一页</button>
          <span id="pageInfo">0 / 0</span>
          <button id="nextPageButton" class="ghost-button">下一页</button>
        </div>
      </section>

      <section id="artistsView" class="view">
        <div class="section-head">
          <div>
            <h2>作者</h2>
            <p>按本地作品数量排序</p>
          </div>
        </div>
        <div id="artistList" class="artist-list"></div>
      </section>

      <section id="syncView" class="view">
        <div class="section-head">
          <div>
            <h2>关注管理</h2>
            <p>管理关注的作者列表</p>
          </div>
        </div>
        <div class="import-strip">
          <div>
            <strong>Cookie 导入</strong>
            <span>导入 Get cookies.txt 导出的 txt/json 文件。</span>
          </div>
          <label class="file-button">
            选择 txt
            <input id="cookieFileInput" type="file" accept=".txt,.json" />
          </label>
          <button id="importCookieButton" class="ghost-button" type="button">导入 Cookie</button>
        </div>
        <form id="followForm" class="follow-form">
          <input id="followArtistId" inputmode="numeric" placeholder="作者 ID" />
          <input id="followArtistName" placeholder="备注名称，可选" />
          <button class="ghost-button" type="submit">添加关注</button>
        </form>
        <div id="followedList" class="artist-list"></div>
      </section>

      <section id="pluginView" class="view">
        <div class="section-head">
          <div>
            <h2 id="pluginViewTitle">插件</h2>
            <p id="pluginViewDesc">使用已导入插件解析和下载内容</p>
          </div>
        </div>
        <form id="pluginForm" class="x-media-form">
          <input id="pluginTargetInput" placeholder="输入链接或关键词" autocomplete="off" />
          <input id="pluginLimitInput" type="number" min="1" max="200" value="20" />
          <button class="primary-button" type="submit">解析预览</button>
        </form>
        <div class="x-actions">
          <label><input id="pluginSelectAll" type="checkbox" checked /> 全选</label>
          <button id="downloadPluginSelectedButton" class="primary-button" type="button">下载选中</button>
          <span id="pluginSummary">等待解析</span>
        </div>
        <div id="pluginGrid" class="x-media-grid"></div>
      </section>
    </main>

    <dialog id="detailDialog" class="detail-dialog">
      <button id="closeDialogButton" class="close-button" aria-label="关闭">×</button>
      <div id="detailContent"></div>
    </dialog>

    <script src="/assets/app.js"></script>
  </body>
</html>
